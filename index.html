<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>School Notes</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Student Notes</p>
        <h1>School Notes</h1>
      </div>
      <button id="toggle-theme" class="ghost-btn">Dark Mode</button>
    </header>

    <main class="mobile-layout">
      <section class="panel sidebar-panel">
        <div class="panel-header">
          <h2>Classes</h2>
          <button id="add-class-btn" class="primary-btn">+ Class</button>
        </div>

        <ul id="class-list" class="card-list"></ul>
      </section>

      <section class="panel notes-panel">
        <div class="panel-header">
          <div>
            <h2 id="current-class-title">Select a class</h2>
            <p id="current-class-subtitle" class="subtext">Choose a class to view notes</p>
          </div>
          <div class="actions-row">
            <button id="rename-class-btn" class="ghost-btn" disabled>Rename</button>
            <button id="delete-class-btn" class="danger-btn" disabled>Delete</button>
            <button id="add-note-btn" class="primary-btn" disabled>+ Note</button>
          </div>
        </div>

        <div class="notes-grid">
          <aside class="notes-list-card">
            <div class="notes-list-header">
              <h3>Notes</h3>
            </div>
            <ul id="note-list" class="card-list"></ul>
          </aside>

          <section class="editor-card">
            <div class="editor-toolbar">
              <button id="rename-note-btn" class="ghost-btn" disabled>Rename Note</button>
              <button id="delete-note-btn" class="danger-btn" disabled>Delete Note</button>
            </div>

            <input
              id="note-title"
              type="text"
              placeholder="Note title"
              disabled
            />

            <textarea
              id="note-content"
              placeholder="Start typing your notes here..."
              disabled
            ></textarea>

            <div class="drawing-section">
              <div class="drawing-header">
                <h3>Drawing Pad</h3>
                <div class="drawing-actions">
                  <button id="clear-canvas-btn" class="ghost-btn" disabled>Clear Drawing</button>
                  <button id="save-drawing-btn" class="primary-btn" disabled>Save Drawing</button>
                </div>
              </div>

              <div class="canvas-wrap">
                <canvas id="drawing-canvas"></canvas>
              </div>
            </div>

            <div class="editor-footer">
              <span id="save-status">Saved locally on this device</span>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
